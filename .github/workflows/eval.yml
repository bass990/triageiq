name: Eval

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Eval mode: small (~$0.50-$1) or full (~$5-10)"
        required: true
        default: "small"
        type: choice
        options:
          - small
          - full

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: .
        run: python -m eval.runners --mode ${{ inputs.mode }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: eval/reports/run_*.md
          if-no-files-found: warn
